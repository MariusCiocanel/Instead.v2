<svg width="130" height="118" viewBox="0 0 130 118" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Body -->
  <ellipse cx="58" cy="74" rx="38" ry="28" stroke="#B7C2B0" stroke-width="2" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="88" cy="48" r="14" stroke="#B7C2B0" stroke-width="2"/>
  <!-- Neck connection -->
  <path d="M82 61 Q86 56 90 62" stroke="#B7C2B0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Crest / topknot -->
  <path d="M85 34 Q83 25 89 18" stroke="#B7C2B0" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M89 18 Q94 13 91 20" stroke="#B7C2B0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Beak -->
  <path d="M101 46 L110 49 L101 52" stroke="#B7C2B0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Eye -->
  <circle cx="93" cy="45" r="2.5" fill="#B7C2B0"/>
  <!-- Eye ring (subtle) -->
  <circle cx="93" cy="45" r="4.5" stroke="#B7C2B0" stroke-width="0.8" opacity="0.4"/>
  <!-- Wing sweep across body -->
  <path d="M28 72 Q48 60 80 70" stroke="#B7C2B0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Secondary wing line -->
  <path d="M34 80 Q55 70 78 78" stroke="#B7C2B0" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Breast chevron markings -->
  <path d="M52 79 Q60 85 68 79" stroke="#B7C2B0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M48 86 Q56 91 64 86" stroke="#B7C2B0" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Tail feathers (flowing left) -->
  <path d="M20 68 Q8 60 5 67 Q3 75 16 78" stroke="#B7C2B0" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M20 76 Q6 78 5 87" stroke="#B7C2B0" stroke-width="1.7" stroke-linecap="round" fill="none"/>
  <path d="M22 83 Q10 87 12 96" stroke="#B7C2B0" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Left leg -->
  <path d="M50 98 L48 108" stroke="#B7C2B0" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M48 108 L42 112 M48 108 L53 112 M48 108 L48 114" stroke="#B7C2B0" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Right leg -->
  <path d="M66 98 L64 108" stroke="#B7C2B0" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M64 108 L58 112 M64 108 L69 112 M64 108 L64 114" stroke="#B7C2B0" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Ground shadow line -->
  <path d="M36 114 Q56 111 78 114" stroke="#B7C2B0" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
</svg>
